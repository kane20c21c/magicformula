# Area 4 — 변동성·위치 (Volatility / Position) 영역 spec
# 작성: 2026-05-30 Kane & 클로이 (M4 분석)
# 출처: docs/area_specs/volatility.md

area: volatility
status: 분석 완료, 백테스트 대기

# ─────────────────────────────────────────────────────
# 점수 산출 — BB %B × 52주 위치 × 레짐 결합 점수표 (±10)
# ─────────────────────────────────────────────────────
scoring:
  method: joint_bb_52w_regime
  philosophy: "BB위치 × 52주위치 × 레짐 3차원 결합. 단독/2차원보다 신호 선명."

  # 버킷 정의
  bb_pctb:
    formula: "(Close - BB_lower) / (BB_upper - BB_lower)"
    buckets:
      돌파상: "> 1.0"
      상단:   "0.8 ~ 1.0"
      중간:   "0.2 ~ 0.8"
      하단:   "0.0 ~ 0.2"
      돌파하: "< 0.0"
  pos_52w:
    formula: "(Close - 52w_low) / (52w_high - 52w_low)"
    window: 252
    buckets:
      고점: ">= 0.8"
      중간: "0.2 ~ 0.8"
      저점: "<= 0.2"

  # 점수표 (BB버킷, 52주버킷) → (강세장점수, 하락조정장점수)
  # 강세장 = quickregime 강세지속/강세약화, 하락조정 = 조정/하락
  # 강세 컬럼은 down베팅 제거 조정 (Kane 2026-05-30 수동)
  score_table:
    돌파상_고점: [5, -5]
    돌파상_중간: [7, -2]
    돌파상_저점: [10, 0]
    상단_고점:   [0, -5]
    상단_중간:   [2, -5]
    상단_저점:   [5, -10]
    중간_고점:   [0, -2]
    중간_중간:   [2, -2]
    중간_저점:   [10, 10]   # 전천후 최강
    하단_고점:   [0, 8]
    하단_중간:   [4, 5]
    하단_저점:   [10, 4]
    돌파하_고점: [8, 10]
    돌파하_중간: [4, 10]    # 강세 단기눌림 매수 / 하락 과매도 반등
    돌파하_저점: [10, 0]

  output_range: [-10.0, 10.0]
  coverage: 0.698           # 비-제로 비율
  min_rows_required: 60

# ─────────────────────────────────────────────────────
# quickregime — 거래량 영역과 공유 (동일 파라미터)
# ─────────────────────────────────────────────────────
quickregime:
  shared_with: volume       # 거래량 영역과 동일 레짐 판별기
  breadth_lookback: 3
  breadth_horizon: 5
  high_threshold: 0.52
  low_threshold: 0.40
  trend_lookback: 5

# ─────────────────────────────────────────────────────
# 검증 성능 (h=5)
# ─────────────────────────────────────────────────────
performance:
  evaluation_window: "2025-05-28 ~ 2026-05-28"
  evaluation_horizon: 5
  bench_pos_ratio: 0.565

  joint:
    realistic_hit: 0.547
    vs_bench_pp: -1.8
    coverage: 0.698

  # 점수 분포
  score_distribution:
    mean: 0.87
    std: 3.17
    nonzero_pct: 69.8
    plus10_pct: 3.0

  # 월별 (강세 조정 후)
  monthly:
    bear_2026_03_vs_bench_pp: 11.2   # 하락장 알파
    bear_2026_05_vs_bench_pp: 7.9
    bull_2026_01_clean_vs_bench_pp: 2.1   # 깨끗한 강세 (오분류 0)
    bull_2025_09_misclass_vs_bench_pp: -10.4   # 레짐 오분류 잔여손실
    bull_2026_04_misclass_vs_bench_pp: -8.7

# ─────────────────────────────────────────────────────
# 핵심 발견
# ─────────────────────────────────────────────────────
findings:
  - "BB 상단돌파 82.7% 가 52주 신고가권 (신고가=추세)"
  - "BB 하단돌파 69.8% 가 52주 레인지내 (일시적 눌림=반등). 빈도 2.18%로 드뭄"
  - "중간+저점 = 전천후 최강 (강세 +19.8 / 하락 +19.1)"
  - "돌파하+중간 = 레짐 반전 (강세 -3 / 하락 +18.2)"
  - "AND 결합이 단독(-2.4)보다 5~8배 강한 신호 (+13~19)"
  - "52주 단독 trend, BB 단독은 무신호. 결합해야 신호."

# ─────────────────────────────────────────────────────
# 한계 / 미해결
# ─────────────────────────────────────────────────────
caveats:
  - "강세장 레짐 오분류 잔여손실 (2025-09/2026-02/04) — quickregime 이 강세장 중 일시 하락일 오분류. 5영역 종합 시 regime 파라미터 통합 조정으로 해결 예정."
  - "in-sample 점수표 (같은 기간 4분면 분석으로 도출). 백테스트 필요."
  - "표본 적은 칸 (저점 계열 n<20) 점수 극단이나 발생 빈도 낮아 실신호 기여 작음."
