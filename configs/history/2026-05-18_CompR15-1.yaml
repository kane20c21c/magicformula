# =============================================================================
# active_strategy.yaml — 현재 운영 중인 황금률 전략
# -----------------------------------------------------------------------------
# 이 파일은 데일리 리포트(scripts/daily_signal.py)가 매일 읽어서 사용합니다.
# 월 1회 분석(analysis/)에서 새로운 최적 조합이 도출되면, 그 결과를
# 이 파일에 반영하고 configs/history/ 에 사본을 백업합니다.
#
# 분석 결과를 수동 반영하려면 이 파일을 직접 편집하세요.
# 자동 반영 도구는 scripts/update_strategy.py (P6에서 구현 예정).
# =============================================================================

# 전략 식별자 (분석 보고서의 가중치 조합 레이블과 동일하게 유지)
strategy_id: CompR15

# 마지막 갱신 일자 (분석을 반영한 날짜, YYYY-MM-DD)
last_updated: 2026-05-18

# 이 전략을 도출한 분석 산출물 경로 (감사 추적용)
source_analysis: output/analysis/2026-05-18/weight_ranking.md

# -----------------------------------------------------------------------------
# 5영역 가중치 — 합계 1.0 (config.py 가 검증)
# -----------------------------------------------------------------------------
weights:
  trend:      0.30   # 추세      (MA 정배열·크로스·MA60 기울기)
  momentum:   0.15   # 모멘텀    (RSI·Stoch·MACD)
  volume:     0.10   # 거래량    (상대거래량·OBV)
  volatility: 0.25   # 변동성·위치 (BB %B·52주 위치)
  wyckoff:    0.20   # 심리·Wyckoff (국면·Hope·Anxiety)

# -----------------------------------------------------------------------------
# 진입 규칙
# -----------------------------------------------------------------------------
# R1       : composite_score 가 threshold 를 상향 돌파한 첫날
# R2       : composite_score 가 threshold 이상이면서 미보유 (절대 수준)
# R3       : composite_score 가 음수→양수 부호 전환 + ADX(14) > 20
# ADAPTIVE : 종목별 점수 패턴으로 R1/R3/SKIP 동적 결정
rule: R1

# -----------------------------------------------------------------------------
# Area 4 (변동성·위치) 점수 산출 방식
# -----------------------------------------------------------------------------
# trend       : BB 상단·52주 신고점 = 강세 지속 (+) — 추세추종
# contrarian  : BB 하단·52주 저점  = 매수 기회 (+) — 평균회귀
area4_mode: trend

# -----------------------------------------------------------------------------
# R1·R2 진입 임계값 (R3 는 항상 0 기준 부호 전환)
# -----------------------------------------------------------------------------
threshold: 5.0

# -----------------------------------------------------------------------------
# 종목 유니버스
# -----------------------------------------------------------------------------
# core_59 : longlivevault CORE_TICKERS 에서 제외종목(207940, 0126Z0) 뺀 59개
# 종목 목록은 magic_formula._vault.get_universe(universe) 에서 해석합니다.
universe: core_59
